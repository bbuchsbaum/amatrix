# PR gate for amatrix — runs on every push / pull_request. See also:
#   - .github/workflows/nightly-stress.yaml  (scheduled heavy gate)
#   - .github/workflows/release-gate.yaml    (manual release gate)
# Track 2 of the hardening plan defines the three-lane gate system.
#
# Budget target: < 15 minutes total.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # dependencies: "hard" exists only to skip the optional GPU backend
          # sister packages (amatrix.mlx/.metal/.opencl/.arrayfire), whose
          # system deps aren't available on default CI runners. It also drops
          # every CRAN Suggests, so re-add them all explicitly: the check
          # toolchain (testthat, knitr, rmarkdown), the test-harness deps
          # (callr, pkgload, rprojroot, withr), and irlba/ggplot2 so fallback
          # paths get real CI coverage instead of skipping.
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
            any::callr
            any::pkgload
            any::rprojroot
            any::withr
            any::irlba
            any::ggplot2
          needs: check
          dependencies: '"hard"'
          cache-version: 2

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
          # NOTE about foreign function calls is expected (cross-package
          # bridge to optional backend sister packages). Documented in
          # cran-comments.md.
          error-on: '"warning"'

  # ---------------------------------------------------------------------------
  # Fast PR gates: run alongside R-CMD-check on Linux only. These enforce the
  # Track 2 PR-gate contract: coverage table integrity, smoke install-load,
  # baseline purity, and (when Track 3 lands it) dispatch audit hermeticity.
  # ---------------------------------------------------------------------------
  fast-gates:
    runs-on: ubuntu-latest
    name: fast-gates (coverage / smoke / dispatch-audit / baseline-purity)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for the baseline-purity diff against origin/main.
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat
          needs: check
          dependencies: '"hard"'

      - name: Coverage-table gate (Track 1 machinery)
        # No load_all needed — test reads NAMESPACE and the quality doc only.
        shell: Rscript {0}
        run: |
          result <- testthat::test_file(
            "tests/testthat/test-coverage-table.R",
            reporter = "summary"
          )
          df <- as.data.frame(result)
          if (any(df$failed > 0L) || any(df$error)) {
            stop("Coverage-table gate failed — see output above.")
          }

      - name: Coverage-table sync gate (exports + harness ops vs quality-tracking.md)
        run: Rscript tools/sync-coverage-table.R

      - name: Dispatch audit gate (Track 3 machinery, optional until delivered)
        run: |
          if [ -f tools/audit-dispatch.R ]; then
            echo "Running tools/audit-dispatch.R"
            Rscript tools/audit-dispatch.R
          else
            echo "tools/audit-dispatch.R not present yet (Track 3 deliverable)."
            echo "Skipping dispatch audit gate."
          fi

      - name: Smoke install-load gate
        run: |
          if [ -f tools/smoke-install-load.R ]; then
            Rscript tools/smoke-install-load.R
          else
            echo "::warning::tools/smoke-install-load.R not found"
          fi

      - name: Baseline purity gate (regression normalization ban)
        # Baseline updates must land in dedicated commits. A PR that modifies
        # both R/ and tools/baseline.csv in the same changeset is rejected so
        # that regressions cannot be silently absorbed by a mixed commit.
        # See planning_docs/quality-tracking.md §7 rule 3.
        shell: bash
        run: |
          set -euo pipefail
          # Determine the base ref to diff against.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            # push event on main — compare to HEAD~1.
            base_ref="HEAD~1"
          fi
          echo "Comparing changed files against $base_ref"
          changed=$(git diff --name-only "$base_ref"...HEAD || true)
          if [ -z "$changed" ]; then
            echo "No changed files detected; skipping."
            exit 0
          fi
          echo "Changed files:"
          echo "$changed"
          touches_baseline=$(echo "$changed" | grep -E '^tools/baseline\.csv$' || true)
          touches_r=$(echo "$changed" | grep -E '^R/' || true)
          if [ -n "$touches_baseline" ] && [ -n "$touches_r" ]; then
            echo ""
            echo "::error::Baseline purity gate failed."
            echo "This changeset modifies both tools/baseline.csv AND files under R/."
            echo "Baseline updates must land in a dedicated commit (no R/ changes),"
            echo "with a written explanation in the commit message. See"
            echo "planning_docs/quality-tracking.md §7 rule 3."
            exit 1
          fi
          echo "Baseline purity gate OK."

  # ---------------------------------------------------------------------------
  # Backend sub-package checks: R CMD build + check for each backends/* package
  # on its target OS, WITHOUT the native GPU library present. This enforces the
  # graceful-degradation contract (mock bridge / available = FALSE) that the
  # R-universe source builders exercise, and proves the Windows build path for
  # amatrix.opencl / amatrix.arrayfire. Runners have no GPU: native execution
  # is certified separately (planning_docs/backend-certification.md).
  # Gate is on check ERROR; pre-existing WARNINGs are tracked for cleanup.
  # ---------------------------------------------------------------------------
  backend-checks:
    runs-on: ${{ matrix.config.os }}
    name: backends (${{ matrix.config.os }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  backends: "amatrix.mlx amatrix.metal amatrix.opencl amatrix.arrayfire"}
          - {os: macos-latest,   backends: "amatrix.mlx amatrix.metal"}
          - {os: windows-latest, backends: "amatrix.opencl amatrix.arrayfire"}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies and core amatrix
        shell: Rscript {0}
        run: |
          install.packages(c("Matrix", "jsonlite", "testthat", "callr"))
          install.packages(".", repos = NULL, type = "source")

      - name: Build and check backend packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ matrix.config.backends }}; do
            echo "::group::$pkg"
            R CMD build "backends/$pkg"
            if ! R CMD check --no-manual "$pkg"_*.tar.gz; then
              echo "::group::$pkg 00install.out"
              cat "$pkg.Rcheck/00install.out" 2>/dev/null || true
              echo "::endgroup::"
              echo "::group::$pkg testthat.Rout.fail"
              cat "$pkg.Rcheck/tests/testthat.Rout.fail" 2>/dev/null || true
              echo "::endgroup::"
              exit 1
            fi
            echo "::endgroup::"
          done
